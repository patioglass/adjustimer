<!DOCTYPE html>
<head>
    <title>AdjusTimer</title>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0 auto;
            text-align: center;
        }
        #wrapper {
            height: 500px;
        }
        #remaining_time_wrapper{
            margin-top: 60px;
            font-size: 50px;
        }
        #video__title {
            font-size: 70%;
            margin-bottom: 20px;
        }
    </style>
    <script src="adjustimer.js"></script>
</head>
<body>
    <div id="wrapper">
        <h1>AdjusTimer(アジャスタイマー)</h1>
        <p>バグ報告・要望などはTweitter/Gメール経由でよろしくお願いします。</p>
        <a href="https://twitter.com/patioglass" target="_blank">@patioglass</a>/<span>patiopatimon@gmail.com</span>
        <p><input id="switch_background" type="checkbox">グリーンバックにする</p>
        <div id="remaining_time_wrapper">
            <div id="video__title">(ここにタイトルが入ります)</div>
            <div id="video__time">
                <span id="video__time_current">00:00:00</span>
                <!-- <span id="video__time_remaining"></span> -->
            </div>
        </div>
        <div id="alert">現在、AmazonPrimeの情報は取得できていません。再生ボタンを押すことで読み込みが開始されます。</div>
    </div>
</body>
</html>
