<!DOCTYPE html>
<head>
    <title>AdjusTimer</title>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0 auto;
            text-align: center;
        }
        #wrapper {
            padding: 30px;
            background-color: #ccc;
        }
        #remaining_time_wrapper {
            margin-top: 60px;
            font-size: 50px;
            color: #77D5FF;
            font-weight: bold;
            letter-spacing : 10px;
        }
        .howto_link {
            text-decoration: none;
            color: #444;
            padding: 10px 40px;
            border: #ccc 1px solid;
            border-radius: 5px;
        }
        .howto_link:hover {
            color: white;
            background-color: rgb(102, 219, 255);
        }
        .button__sync {
            font-size: 20px;
            color: white;
            width: 300px;
            font-weight: bold;
            background-color: rgb(88, 86, 85);
            border: 1px solid white;
            border-radius: 8px;
            padding: 20px;
            margin: 0 auto;
        }
        #button__get_video_info {
            background-color: coral !important;
            cursor: pointer;
        }
        #button__get_video_info:hover {
            background-color: rgb(230, 61, 0) !important;
        }
        #video__title {
            font-size: 70%;
            margin-bottom: 20px;
        }
        .entry {
            display: inline-block;
            margin-left: 15px;
            border: 1px solid #ccc;
            border-radius: 7px;
            padding: 7px;
        }
        .color-picker-wrapper {
            margin-top: 15px;
        }
        .word-text-stroke {
            text-shadow:
                3px 3px 3px #000,
                -3px 3px 3px #000,
                3px -3px 3px #000,
                -3px -3px 3px #000,
                3px 0px 3px #000,
                3px 3px 3px #000,
                -3px 0px 3px #000,
                0px -3px 3px #000;
        }

    </style>
    <script src="./lib/pickr/js/pickr.min.js"></script>
    <script src="./lib/pickr/js/pickr.es5.min.js"></script>
    <link rel="stylesheet" href="./lib/pickr/css/classic.min.css">
    <link rel="stylesheet" href="./lib/pickr/css/monolith.min.css">
    <link rel="stylesheet" href="./lib/pickr/css/nano.min.css">

    <link href="https://fonts.googleapis.com/earlyaccess/nicomoji.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=M+PLUS+Rounded+1c" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Sawarabi+Gothic" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+JP" rel="stylesheet">

    <script src="adjustimer.js"></script>
</head>
<body>
    <h1><img src="./img/icon48.png">AdjusTimer(アジャスタイマー)</h1>
    <h2>最終更新:2021/09/09(Ver. 1.5)</h2>
    <a href="https://patiopatimon.com/adjustimer" class="howto_link" target="_blank">使い方ページ</a>

    <br>
    <br>
    <br>
    <div id="button__start">対応ページ(Amazon Prime Video / ウォッチパーティ)の画面から起動してください</div>
    <h2>現在ページ: <span id="current_page_name"><未対応のページ></span>です</h2>

    <div class="button__sync">情報を取得する</div>

    <div class="color-picker-wrapper">
        <p><input id="switch_border" type="checkbox" checked="checked">縁取り</p>
        <p><select name="文字フォント選択">
            <option value="'Segoe UI',Arial,Meiryo,sans-serif">通常</option>
            <option value="'M PLUS Rounded 1c'">M PLUS Rounded 1c</option>
            <option value="'Nico Moji'">ニコモジ</option>
            <option value="'Sawarabi Gothic'">さわらびゴシック</option>
            <option value="'Noto Sans JP'">Noto Sans JP</option>
        </select></p>
        <div class="entry">
            <div class="innr">
                <div class="another">
                    <div class="word-color-picker"></div>
                    <span>文字色の変更</span>
                </div>
            </div>
        </div>
        <div class="entry" id="border-wrapper">
            <div class="innr">
                <div class="another">
                    <div class="border-color-picker"></div>
                    <span>文字縁取り色の変更</span>
                </div>
            </div>
        </div>
        <div class="entry">
            <div class="innr">
                <div class="another">
                    <div class="background-color-picker"></div>
                    <span>背景色の変更</span>
                </div>
            </div>
        </div>
    </div>
    <hr>
    <div id="wrapper">
        <div id="remaining_time_wrapper">
            <div id="video__title" class="word-text-stroke">(未取得)</div>
            <div id="video__time">
                <span id="video__time_current" class="word-text-stroke">00:00:00</span>
            </div>
        </div>
    </div>
</body>
</html>
